name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  portability:
    name: Portability + drift + manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Portable Skill Contract lint
        run: python3 scripts/portability_lint.py
      - name: Vendored-file drift check
        run: python3 scripts/check_vendored.py
      - name: Manifest + parity validation
        run: python3 scripts/validate_manifests.py
      # recoup-records is now a first-class, hand-maintained plugin (not generated
      # from the source plugins), so the bundle-drift gate is intentionally retired.
      # The generator (scripts/build_records_plugin.py) is kept for one-off reseeding
      # but no longer gates CI. See docs/fat-skills-benchmark.md.
      - name: Resolver reachability (no dark skills)
        run: python3 scripts/check_resolvable.py
      - name: Resolver eval (routing fixtures + coverage)
        run: python3 scripts/run_resolver_eval.py
