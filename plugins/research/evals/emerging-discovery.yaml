name: emerging-discovery
skill: recoup-trend-detection
input: "Find emerging indie R&B artists in the US with 50K-200K listeners"
expected:
  - ranked list of emerging artists
  - growth velocity metrics
  - cross-platform validation (Spotify + TikTok)
  - career_stage filtering
must_call:
  - "GET /research/discover"
  - "GET /research/metrics" (at least 2 sources per candidate)
must_not:
  - passing country_code to TikTok charts
  - artists with career_stage = mainstream or superstar
  - more than 50 unvalidated candidates
