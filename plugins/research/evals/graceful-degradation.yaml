name: graceful-degradation
skill: recoup-web-intelligence
input: "Research an extremely obscure local artist that Chartmetric won't have"
expected:
  - fallback to web research endpoints
  - structured findings despite no Chartmetric data
  - clear indication that primary data was unavailable
must_call:
  - "GET /research?q=" (initial attempt)
  - "POST /research/web" (first fallback)
must_not:
  - "I couldn't find any data" without trying web fallback
  - passing match_strength < 1 IDs into detail endpoints
  - giving up after one empty response
